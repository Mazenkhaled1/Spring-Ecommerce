spring:
  application:
    name: store

  datasource:
    url: jdbc:mysql://localhost:3306/store_api?createDatabaseIfNotExist=true
    username: root
    password:

  jpa:
    show-sql: true

  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 7200
    accessRefreshExpiration: 604800

stripe:
  secretKey: ${STRIPE_SECRET_KEY}

  webhookSecretKey: ${STRIPE-WEBHOOK-SECRET-KEY}

websiteUrl: http://localhost:4343

server:
  port: 8081